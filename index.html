<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="sticky-header">
        <div class="summary-card">
            <div class="balance-item">
                <small>Remaining</small>
                <h1 id="total-remaining">$0.00</h1>
            </div>
            <div class="summary-details">
                <div><small>Budget</small><p id="total-budget">$0</p></div>
                <div><small>Spent</small><p id="total-spent">$0</p></div>
            </div>
        </div>
    </header>

    <main id="app">
        <!-- Dashboard Section -->
        <section id="dashboard" class="view">
            <div id="category-cards"></div>
        </section>

        <!-- History Section -->
        <section id="history" class="view hidden">
            <div class="filter-bar">
                <select id="filter-category">
                    <option value="All">All Transactions</option>
                    <option value="Needs">Needs</option>
                    <option value="Wants">Wants</option>
                    <option value="Savings">Savings</option>
                </select>
            </div>
            <div id="transaction-list"></div>
        </section>

        <!-- Settings Section -->
        <section id="settings" class="view hidden">
            <div class="card">
                <h3>Set Monthly Limits</h3>
                <div class="input-group">
                    <label>Needs</label>
                    <input type="number" id="limit-needs" placeholder="3000">
                </div>
                <div class="input-group">
                    <label>Wants</label>
                    <input type="number" id="limit-wants" placeholder="1500">
                </div>
                <div class="input-group">
                    <label>Savings</label>
                    <input type="number" id="limit-savings" placeholder="1000">
                </div>
                <button onclick="app.updateLimits()" class="btn-primary">Save Limits</button>
            </div>
            <div class="card data-actions">
                <button onclick="app.exportData()" class="btn-outline">Export JSON</button>
                <button onclick="document.getElementById('import-file').click()" class="btn-outline">Import JSON</button>
                <input type="file" id="import-file" hidden onchange="app.importData(event)">
                <button onclick="app.resetMonth()" class="btn-danger">Reset Month</button>
            </div>
        </section>
    </main>

    <!-- Add Transaction FAB/Modal -->
    <button class="fab" onclick="app.toggleModal(true)">+</button>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3>Add Transaction</h3>
            <input type="number" id="trans-amount" placeholder="Amount" inputmode="decimal">
            <select id="trans-category">
                <option value="Needs">Needs</option>
                <option value="Wants">Wants</option>
                <option value="Savings">Savings</option>
            </select>
            <input type="text" id="trans-desc" placeholder="Description (Optional)">
            <input type="date" id="trans-date">
            <div class="modal-btns">
                <button onclick="app.toggleModal(false)" class="btn-secondary">Cancel</button>
                <button onclick="app.addTransaction()" class="btn-primary">Add</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="app.switchView('dashboard')" class="nav-item active">Dash</button>
        <button onclick="app.switchView('history')" class="nav-item">History</button>
        <button onclick="app.switchView('settings')" class="nav-item">Settings</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
